# Dedicated local-dev config for the Shopify test app.
# Use this only for local preview and dev-store testing.

client_id = "dadbec5afb4fbddb896fe55a7ea3ff9b"
name = "forestock-test"
application_url = "https://themes-tracy-slide-shaw.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "products/create" ]
  uri = "/webhooks/products/create"

  [[webhooks.subscriptions]]
  topics = [ "products/update" ]
  uri = "/webhooks/products/update"

  [[webhooks.subscriptions]]
  topics = [ "products/delete" ]
  uri = "/webhooks/products/delete"

  [[webhooks.subscriptions]]
  topics = [ "inventory_levels/update" ]
  uri = "/webhooks/inventory_levels/update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
scopes = "read_products,read_inventory,read_orders"

[auth]
redirect_urls = [
  "https://themes-tracy-slide-shaw.trycloudflare.com/auth/callback",
  "https://themes-tracy-slide-shaw.trycloudflare.com/auth/shopify/callback"
]
