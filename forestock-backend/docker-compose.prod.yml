# docker-compose.prod.yml — production: app + PostgreSQL
# All secrets must be set as environment variables — never hardcode values here.
services:

  postgres:
    image: postgres:16-alpine
    container_name: forestock-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forestock}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-forestock}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: forestock-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-forestock}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-eu-central-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_SNS_TOPIC_ARN: ${AWS_SNS_TOPIC_ARN}
      JWT_SECRET: ${JWT_SECRET}
      FORESTOCK_ALERT_EMAIL: ${FORESTOCK_ALERT_EMAIL}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
