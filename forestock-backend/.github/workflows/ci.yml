name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forestock_test
          POSTGRES_USER: forestock_user
          POSTGRES_PASSWORD: forestock_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forestock_user -d forestock_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/forestock_test
          SPRING_DATASOURCE_USERNAME: forestock_user
          SPRING_DATASOURCE_PASSWORD: forestock_pass
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_S3_BUCKET: test-bucket
          JWT_SECRET: dGVzdC1zZWNyZXQta2V5LWZvci1jaS10ZXN0aW5nLW9ubHktMzJieXRlcw==
          FORESTOCK_ALERT_EMAIL: ci@example.com
        run: ./mvnw verify -q

      - name: Build Docker image (smoke test)
        run: docker build -t forestock-backend:ci .
