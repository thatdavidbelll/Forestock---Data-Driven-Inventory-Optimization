<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forestock — Roadmap Tracker</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg2: #f7f6f2;
    --bg3: #f0efe9;
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #9c9a92;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --info: #185fa5;
    --info-bg: #e6f1fb;
    --warn: #854f0b;
    --warn-bg: #faeeda;
    --danger: #a32d2d;
    --danger-bg: #fcebeb;
    --purple: #534ab7;
    --purple-bg: #eeedfe;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2a2a27;
      --bg3: #323230;
      --text: #e8e6de;
      --text2: #b0ae a6;
      --text3: #6e6c66;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --success: #1d9e75;
      --success-bg: #04342c;
      --info: #378add;
      --info-bg: #042c53;
      --warn: #ef9f27;
      --warn-bg: #412402;
      --danger: #e24b4a;
      --danger-bg: #501313;
      --purple: #7f77dd;
      --purple-bg: #26215c;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-left p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .global-progress {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .global-bar-wrap {
    width: 200px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .global-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--success);
    transition: width 0.4s ease;
  }
  .global-pct {
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    min-width: 36px;
    text-align: right;
  }

  .stats {
    display: flex;
    gap: 8px;
  }
  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .reset-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reset-btn:hover {
    border-color: var(--border2);
    color: var(--text2);
    background: var(--bg2);
  }

  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .sprint {
    margin-bottom: 24px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .sprint-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s;
  }
  .sprint-header:hover { background: var(--bg2); }

  .sprint-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .sprint-info { flex: 1; }
  .sprint-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .sprint-meta {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .sprint-prog {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sprint-bar-wrap {
    width: 140px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .sprint-bar {
    height: 4px;
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .sprint-pct {
    font-size: 12px;
    font-weight: 500;
    min-width: 32px;
    text-align: right;
  }

  .sprint-toggle {
    font-size: 12px;
    color: var(--text3);
    transition: transform 0.2s;
  }
  .sprint.collapsed .sprint-toggle { transform: rotate(-90deg); }

  .sprint-body { padding: 0 20px 12px; }
  .sprint.collapsed .sprint-body { display: none; }

  .category-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text3);
    padding: 16px 0 6px;
  }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.12s;
  }
  .task-row:hover { background: var(--bg2); }
  .task-row.done .task-label {
    color: var(--text3);
    text-decoration: line-through;
  }
  .task-row.done .task-detail { color: var(--text3); }

  .checkbox {
    width: 16px;
    height: 16px;
    min-width: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: var(--bg);
  }
  .checkbox.checked {
    background: var(--success);
    border-color: var(--success);
  }
  .checkmark {
    width: 8px;
    height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translate(1px, -1px);
  }

  .task-label {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .task-detail {
    font-size: 11px;
    color: var(--text2);
    margin-top: 2px;
    line-height: 1.5;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 20px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.02em;
  }
  .badge-aws  { background: var(--warn-bg);    color: var(--warn);    }
  .badge-db   { background: var(--info-bg);    color: var(--info);    }
  .badge-java { background: var(--danger-bg);  color: var(--danger);  }
  .badge-devops { background: var(--success-bg); color: var(--success); }

  .confetti-msg {
    display: none;
    text-align: center;
    padding: 40px;
    font-size: 15px;
    color: var(--success);
    font-weight: 500;
  }
  .confetti-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Forestock — Roadmap Tracker</h1>
    <p>Forecast &amp; Order Planning Platform · 4 sprinturi · 8 săptămâni</p>
  </div>
  <div class="header-right">
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="s-done">0</div>
        <div class="stat-lbl">done</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="s-total">0</div>
        <div class="stat-lbl">total</div>
      </div>
    </div>
    <div class="global-progress">
      <div class="global-bar-wrap">
        <div class="global-bar" id="global-bar" style="width:0%"></div>
      </div>
      <span class="global-pct" id="global-pct">0%</span>
    </div>
    <button class="reset-btn" onclick="resetAll()">Reset</button>
  </div>
</header>

<main id="main"></main>

const STORAGE_KEY = 'forestock_tracker_v1';

// Sprint 1 complet — bifat automat la prima deschidere
const DEFAULT_DONE = {
  t01:true, t02:true, t03:true, t04:true, t05:true,
  t06:true, t07:true, t08:true, t09:true, t10:true,
  t11:true, t12:true, t13:true, t14:true, t15:true,
  t16:true, t17:true, t18:true,
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { ...DEFAULT_DONE };
    return JSON.parse(raw);
  } catch { return { ...DEFAULT_DONE }; }
}

function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function totalTasks() {
  return SPRINTS.reduce((n, s) => n + s.categories.reduce((m, c) => m + c.tasks.length, 0), 0);
}

function doneTasks() {
  return Object.values(state).filter(Boolean).length;
}

function sprintProgress(sprint) {
  let done = 0, total = 0;
  sprint.categories.forEach(c => c.tasks.forEach(t => {
    total++;
    if (state[t.id]) done++;
  }));
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function updateGlobal() {
  const done = doneTasks(), total = totalTasks();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('global-bar').style.width = pct + '%';
  document.getElementById('global-pct').textContent = pct + '%';
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-total').textContent = total;
}

function updateSprintBar(sprintId) {
  const sprint = SPRINTS.find(s => s.id === sprintId);
  const { done, total, pct } = sprintProgress(sprint);
  const bar = document.getElementById('bar-' + sprintId);
  const pctEl = document.getElementById('pct-' + sprintId);
  if (bar) bar.style.width = pct + '%';
  if (pctEl) {
    pctEl.textContent = pct + '%';
    pctEl.style.color = pct === 100 ? 'var(--success)' : 'var(--text3)';
  }
}

function toggle(taskId, sprintId) {
  state[taskId] = !state[taskId];
  saveState(state);
  const row = document.getElementById('row-' + taskId);
  const box = document.getElementById('box-' + taskId);
  row.classList.toggle('done', state[taskId]);
  box.classList.toggle('checked', state[taskId]);
  if (state[taskId]) {
    box.innerHTML = '<div class="checkmark"></div>';
  } else {
    box.innerHTML = '';
  }
  updateGlobal();
  updateSprintBar(sprintId);
}

function toggleSprint(sprintId) {
  const el = document.getElementById('sprint-' + sprintId);
  el.classList.toggle('collapsed');
}

function resetAll() {
  if (!confirm('Resetezi tot progresul? Această acțiune nu poate fi anulată.')) return;
  state = {};
  saveState(state);
  renderAll();
}

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  SPRINTS.forEach(sprint => {
    const { done, total, pct } = sprintProgress(sprint);

    const sprintEl = document.createElement('div');
    sprintEl.className = 'sprint';
    sprintEl.id = 'sprint-' + sprint.id;

    sprintEl.innerHTML = `
      <div class="sprint-header" onclick="toggleSprint('${sprint.id}')">
        <div class="sprint-dot" style="background:${sprint.color}"></div>
        <div class="sprint-info">
          <div class="sprint-title">${sprint.label}</div>
          <div class="sprint-meta">${sprint.weeks} &mdash; ${total} task-uri</div>
        </div>
        <div class="sprint-prog">
          <div class="sprint-bar-wrap">
            <div class="sprint-bar" id="bar-${sprint.id}" style="width:${pct}%;background:${sprint.color}"></div>
          </div>
          <span class="sprint-pct" id="pct-${sprint.id}" style="color:${pct===100?'var(--success)':'var(--text3)'}">${pct}%</span>
        </div>
        <span class="sprint-toggle">&#9660;</span>
      </div>
      <div class="sprint-body"></div>
    `;

    const body = sprintEl.querySelector('.sprint-body');

    sprint.categories.forEach(cat => {
      const catLabel = document.createElement('div');
      catLabel.className = 'category-label';
      catLabel.textContent = cat.name;
      body.appendChild(catLabel);

      cat.tasks.forEach(task => {
        const isDone = !!state[task.id];
        const row = document.createElement('div');
        row.className = 'task-row' + (isDone ? ' done' : '');
        row.id = 'row-' + task.id;
        row.onclick = () => toggle(task.id, sprint.id);

        const badgeHtml = task.badge
          ? `<span class="badge badge-${task.badge}">${task.badge}</span>`
          : '';

        row.innerHTML = `
          <div class="checkbox${isDone?' checked':''}" id="box-${task.id}">
            ${isDone ? '<div class="checkmark"></div>' : ''}
          </div>
          <div>
            <div class="task-label">${task.label}${badgeHtml}</div>
            <div class="task-detail">${task.detail}</div>
          </div>
        `;
        body.appendChild(row);
      });
    });

    main.appendChild(sprintEl);
  });

  updateGlobal();
}

renderAll();
</script>
</body>
</html>
