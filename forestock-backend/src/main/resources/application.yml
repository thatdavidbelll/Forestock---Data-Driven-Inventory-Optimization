spring:
  application:
    name: forestock-backend

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      validation-timeout: 2000
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 300000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway manages the schema — Hibernate only validates
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  jackson:
    default-property-inclusion: non_null

  # Email (password reset) — configure MAIL_* env vars to enable
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  error:
    include-message: always

aws:
  region: eu-central-1
  s3:
    bucket-name: ${AWS_S3_BUCKET:forestock-forecast-data}
    input-prefix: input/
    reports-prefix: reports/
  sns:
    topic-arn: ${AWS_SNS_TOPIC_ARN:}

forestock:
  forecast:
    horizon-days: 14
    safety-buffer-pct: 0.20
    # Minimum history days for full Holt-Winters forecasting; below this threshold falls back to SMA
    min-history-days: 30
    # Weekly seasonality period
    seasonality-period: 7
  scheduler:
    cron: "0 0 2 * * *"
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-a-long-random-string}
    access-token-expiry-hours: 8
    refresh-token-expiry-days: 30
  notifications:
    alert-email: ${FORESTOCK_ALERT_EMAIL:manager@example.com}
  # Super admin seeded on first startup — configure via env vars in production
  super-admin:
    username: ${SUPER_ADMIN_USERNAME:superadmin}
    password: ${SUPER_ADMIN_PASSWORD:Admin@12345}
  # Base URL of the frontend — used in password-reset email links
  frontend-url: ${FORESTOCK_FRONTEND_URL:http://localhost:5173}
  mail:
    from: ${MAIL_FROM:noreply@forestock.app}
  security:
    token-blacklist:
      enabled: true

