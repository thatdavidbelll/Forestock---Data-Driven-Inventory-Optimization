spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5        # Neon pooler (PgBouncer) — keep small
      minimum-idle: 1
      idle-timeout: 600000
      keepalive-time: 30000

  # Flyway uses a dedicated direct connection (non-pooler) to avoid PgBouncer advisory lock issues.
  # SPRING_FLYWAY_URL must point to the Neon direct (non-pooler) host.
  flyway:
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL}}
    user: ${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME}}
    password: ${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}

  jpa:
    show-sql: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

server:
  error:
    include-stacktrace: never
    include-message: never

logging:
  pattern:
    console: "%d{ISO8601} [%X{correlationId}] [%X{storeId}] %-5level %logger{36} - %msg%n"
  level:
    com.forestock.forestock_backend: INFO
    org.springframework.security: WARN
    root: WARN

springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false
