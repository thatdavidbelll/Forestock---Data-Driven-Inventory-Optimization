forestock:
  jwt:
    secret: ${JWT_SECRET}
  super-admin:
    username: ${SUPER_ADMIN_USERNAME}
    password: ${SUPER_ADMIN_PASSWORD}
  shopify:
    enabled: true
    webhook-secret: "dev-test-secret"
    provisioning-secret: "dev-provisioning-secret"

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/forestock
    username: forestock_user
    password: forestock_pass

  jpa:
    show-sql: true

server:
  error:
    include-message: always
    include-stacktrace: always

logging:
  level:
    com.forestock.forestock_backend: DEBUG
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
  api-docs:
    enabled: true
    path: /v3/api-docs
