name: Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: forestock-backend

jobs:

  # ── Detect which parts of the repo changed ──────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      shopify: ${{ steps.filter.outputs.shopify }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'forestock-backend/**'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'forestock-frontend/**'
              - '.github/workflows/deploy.yml'
            shopify:
              - 'shopify-app/**'
              - '.github/workflows/deploy.yml'

  # ── Backend: build image → push ECR → restart on EC2 ───────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('forestock-backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run backend tests
        working-directory: forestock-backend
        run: ./mvnw test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd forestock-backend
          docker build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          NEW_IMAGE: ${{ steps.build.outputs.image }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: NEW_IMAGE,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY
          script: |
            set -e
            cd ~/forestock/forestock-backend

            # Pull latest compose file and config changes
            git -C ~/forestock pull origin main

            # Ensure AWS CLI is available without redownloading it on every deploy.
            if ! command -v aws >/dev/null 2>&1; then
              tmpdir=$(mktemp -d)
              trap 'rm -rf "$tmpdir"' EXIT
              curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmpdir/awscliv2.zip"
              unzip -q -o "$tmpdir/awscliv2.zip" -d "$tmpdir"
              sudo "$tmpdir/aws/install" --update
            fi

            # Free disk space before pulling the next image.
            docker image prune -af || true
            docker builder prune -af || true

            # Login to ECR using credentials passed from GitHub secrets
            export AWS_DEFAULT_REGION=eu-central-1
            aws ecr get-login-password --region eu-central-1 | \
              docker login --username AWS --password-stdin \
              $(echo $NEW_IMAGE | cut -d'/' -f1)

            # Update BACKEND_IMAGE in .env
            if grep -q "^BACKEND_IMAGE=" .env 2>/dev/null; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=$NEW_IMAGE|" .env
            else
              echo "BACKEND_IMAGE=$NEW_IMAGE" >> .env
            fi

            # Pull new image and restart (no rebuild — image comes from ECR)
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-build

            # Remove dangling images to save disk space
            docker image prune -f

            echo "✓ Backend deployed: $NEW_IMAGE"

  # ── Frontend: build → S3 → CloudFront invalidation ─────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: forestock-frontend/package-lock.json

      - name: Install dependencies
        working-directory: forestock-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm ci

      - name: Lint frontend
        working-directory: forestock-frontend
        run: npm run lint

      - name: Type check frontend
        working-directory: forestock-frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: forestock-frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3
        run: |
          # Hashed assets (JS/CSS bundles) — cache forever
          aws s3 sync forestock-frontend/dist/ \
            s3://${{ secrets.S3_FRONTEND_BUCKET }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

          # index.html — never cache (ensures users always get the latest version)
          aws s3 cp forestock-frontend/dist/index.html \
            s3://${{ secrets.S3_FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✓ Frontend deployed"

  # ── Shopify: build on runner → upload artifact → restart on EC2 ───────────
  deploy-shopify:
    name: Deploy Shopify App
    needs: changes
    if: needs.changes.outputs.shopify == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: shopify-app/package-lock.json

      - name: Install dependencies
        working-directory: shopify-app
        run: npm ci

      - name: Type check Shopify app
        working-directory: shopify-app
        run: npm run typecheck

      - name: Lint Shopify app
        working-directory: shopify-app
        run: npm run lint

      - name: Build Shopify app
        working-directory: shopify-app
        env:
          SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
          SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
          SHOPIFY_APP_URL: ${{ secrets.SHOPIFY_APP_URL }}
          SCOPES: ${{ secrets.SHOPIFY_SCOPES }}
          DATABASE_URL: ${{ secrets.SHOPIFY_DATABASE_URL }}
          FORESTOCK_API_BASE_URL: ${{ secrets.FORESTOCK_API_BASE_URL }}
          FORESTOCK_PROVISIONING_SECRET: ${{ secrets.FORESTOCK_PROVISIONING_SECRET }}
        run: npm run build

      - name: Prepare runtime env file
        working-directory: shopify-app
        run: |
          printf '%s\n' \
            "SHOPIFY_API_KEY=${{ secrets.SHOPIFY_API_KEY }}" \
            "SHOPIFY_API_SECRET=${{ secrets.SHOPIFY_API_SECRET }}" \
            "SHOPIFY_APP_URL=${{ secrets.SHOPIFY_APP_URL }}" \
            "SCOPES=${{ secrets.SHOPIFY_SCOPES }}" \
            "SHOP_CUSTOM_DOMAIN=" \
            "DATABASE_URL=${{ secrets.SHOPIFY_DATABASE_URL }}" \
            "FORESTOCK_API_BASE_URL=${{ secrets.FORESTOCK_API_BASE_URL }}" \
            "FORESTOCK_PROVISIONING_SECRET=${{ secrets.FORESTOCK_PROVISIONING_SECRET }}" \
            "NODE_ENV=production" \
            "PORT=3000" > .env
          grep '^SHOPIFY_APP_URL=' .env >/dev/null
          chmod 600 .env

      - name: Package Shopify artifact
        run: |
          tar -czf shopify-app-deploy.tar.gz \
            -C shopify-app \
            build \
            node_modules \
            package.json \
            package-lock.json \
            prisma \
            app \
            public \
            .env

      - name: Upload Shopify artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: shopify-app-deploy.tar.gz
          target: /home/ubuntu/

      - name: Deploy Shopify artifact on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p ~/forestock/shopify-runtime
            rm -rf ~/forestock/shopify-runtime/*
            tar -xzf ~/shopify-app-deploy.tar.gz -C ~/forestock/shopify-runtime

            sudo tee /etc/systemd/system/forestock-shopify.service >/dev/null <<'EOF'
            [Unit]
            Description=Forestock Shopify App
            After=network.target

            [Service]
            Type=simple
            User=ubuntu
            WorkingDirectory=/home/ubuntu/forestock/shopify-runtime
            EnvironmentFile=/home/ubuntu/forestock/shopify-runtime/.env
            ExecStart=/usr/bin/npm start
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            EOF

            sudo systemctl daemon-reload
            sudo systemctl enable forestock-shopify
            sudo systemctl restart forestock-shopify
            sleep 5
            curl -I --max-time 15 http://127.0.0.1:3000

            echo "✓ Shopify app deployed"
